<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Zone Live TV</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0f172a; color: #fff; margin: 0; padding: 15px; }
        .tv-container { max-width: 800px; margin: 0 auto; }
        .video-box { position: relative; width: 100%; height: 230px; background: #000; border-radius: 12px; overflow: hidden; border: 1px solid #1e293b; }
        @media (min-width: 600px) { .video-box { height: 450px; } }
        iframe { width: 100%; height: 100%; border: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; margin-top: 20px; }
        .btn { background: #1e293b; border: 1px solid #334155; color: #cbd5e1; padding: 12px 8px; text-align: center; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 13px; transition: 0.2s; }
        .btn.active, .btn:hover { background: #38bdf8; color: #0f172a; }
    </style>
</head>
<body>
<div class="tv-container">
    <div class="video-box">
        <iframe id="tv-player" src="https://www.youtube.com/embed/5NcoCgZ_r_I?autoplay=1&mute=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
    </div>
    
    <div class="grid">
        <div class="btn active" onclick="play('5NcoCgZ_r_I', this)">DBC News</div>
        <div class="btn" onclick="play('J6VbZf_b10s', this)">News24</div>
        <div class="btn" onclick="play('coYw-mB8Z50', this)">Channel 24</div>
        <div class="btn" onclick="play('6_rreE1k3mE', this)">RTV Live</div>
        <div class="btn" onclick="play('v_T7_t7wVb0', this)">Somoy TV</div>
        <div class="btn" onclick="play('w6IWev23fU4', this)">Jamuna TV</div>
        <div class="btn" onclick="play('g9mR8vP8b_s', this)">Independent</div>
        <div class="btn" onclick="play('zZWhIe-wR3Y', this)">Ekattor TV</div>
        <div class="btn" onclick="play('S-F3_G0D6Xk', this)">ATN Bangla</div>
        <div class="btn" onclick="play('x38Y1p9y_vM', this)">Channel i</div>
    </div>
</div>

<script>
    function play(videoId, btn) {
        var player = document.getElementById('tv-player');
        // বাটন ক্লিক করলে আনমিউট অবস্থায় প্লে হবে
        player.src = "https://www.youtube.com/embed/" + videoId + "?autoplay=1";
        
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
</script>
</body>
</html>
