<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Zone Premium Live TV</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0f172a; color: #fff; margin: 0; padding: 15px; }
        .tv-container { max-width: 800px; margin: 0 auto; }
        .video-box { position: relative; width: 100%; height: 230px; background: #000; border-radius: 12px; overflow: hidden; border: 1px solid #1e293b; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        @media (min-width: 600px) { .video-box { height: 450px; } }
        iframe { width: 100%; height: 100%; border: none; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 12px; margin-top: 20px; }
        .btn { background: #1e293b; border: 1px solid #334155; color: #cbd5e1; padding: 12px 5px; text-align: center; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 13px; transition: 0.2s; }
        .btn.active, .btn:hover { background: #38bdf8; color: #0f172a; box-shadow: 0 0 10px rgba(56, 189, 248, 0.5); }
    </style>
</head>
<body>
<div class="tv-container">
    <div class="video-box">
        <iframe id="tv-player" src="https://player.twitch.tv/?channel=somoytvlive&parent=watch-tv-six.vercel.app&muted=false" allowfullscreen="true" scrolling="no"></iframe>
    </div>
    
    <div class="grid">
        <div class="btn active" onclick="play('somoytvlive', this)">Somoy TV</div>
        <div class="btn" onclick="play('jamunatv_live', this)">Jamuna TV</div>
        <div class="btn" onclick="play('ch24_live_bd', this)">Channel 24</div>
        <div class="btn" onclick="play('rtv_live_bangla', this)">RTV Live</div>
        <div class="btn" onclick="play('independent_tv_bd', this)">Independent</div>
        <div class="btn" onclick="play('dbcnews_live', this)">DBC News</div>
    </div>
</div>

<script>
    function play(channelName, btn) {
        var player = document.getElementById('tv-player');
        // Vercel ডোমেইনের সাথে সিকিউরড কানেকশন তৈরি করবে
        player.src = "https://player.twitch.tv/?channel=" + channelName + "&parent=watch-tv-six.vercel.app&muted=false";
        
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
</script>
</body>
</html>
